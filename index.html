<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RM Fútbol Base — Torneos 25-26</title>
<style>
:root{
  --blue:#00529F;
  --blue-dark:#003F7A;
  --blue-deep:#002D5C;
  --blue-light:#E8F1FA;
  --blue-mid:#4A90D9;
  --gold:#F5C700;
  --white:#fff;
  --gray-50:#F5F6F8;
  --gray-100:#EAECEF;
  --gray-200:#D5D8DF;
  --gray-400:#9499A6;
  --gray-600:#555B6B;
  --gray-900:#12151E;
  --green:#27AE60;
  --green-light:#E8F8EE;
  --amber:#E67E22;
  --amber-light:#FEF3E7;
  --red:#E74C3C;
  --red-light:#FDECEB;
  --purple:#8E44AD;
  --purple-light:#F3E8F9;
  --teal:#16A085;
  --teal-light:#E6F5F2;
  --r:8px;
  --r2:12px;
  --r3:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--gray-50);color:var(--gray-900);font-size:13px}

/* ===== APP SHELL ===== */
.app{display:flex;height:100vh;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{width:220px;flex-shrink:0;background:var(--blue-deep);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.sidebar-header{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.sidebar-shield{width:32px;height:32px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--blue-deep);flex-shrink:0}
.sidebar-name{font-size:14px;font-weight:700;color:var(--white);line-height:1.2}
.sidebar-season{font-size:11px;color:rgba(255,255,255,0.45);margin-top:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em}
.sidebar-section{padding:12px 16px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.08em}
.team-btn{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background 0.12s;border-radius:0}
.team-btn:hover{background:rgba(255,255,255,0.07)}
.team-btn.active{background:rgba(255,255,255,0.13)}
.team-btn-code{font-size:13px;font-weight:700;color:var(--white);width:52px;flex-shrink:0}
.team-btn-name{font-size:12px;color:rgba(255,255,255,0.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.team-btn.active .team-btn-name{color:rgba(255,255,255,0.85)}
.sidebar-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);margin-left:auto;flex-shrink:0;opacity:0}
.team-btn.has-events .sidebar-dot{opacity:1}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--white);border-bottom:1px solid var(--gray-100);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-team{font-size:17px;font-weight:700;color:var(--gray-900)}
.topbar-fullname{font-size:13px;color:var(--gray-400)}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.tb-preseason{background:var(--amber-light);color:var(--amber)}
.tb-competition{background:var(--green-light);color:var(--green)}
.status-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray-400);padding:4px 10px;border:1px solid var(--gray-200);border-radius:20px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#34C759}
.status-dot.off{background:#FF3B30}

.page{flex:1;overflow-y:auto;padding:20px 24px;display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}

/* ===== CALENDAR PANEL ===== */
.cal-panel{background:var(--white);border-radius:var(--r3);border:1px solid var(--gray-100);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.cal-panel-header{background:var(--blue);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.cal-panel-title{font-size:12px;font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:0.06em}
.cal-meta{display:flex;gap:12px}
.cal-meta-item{text-align:center}
.cal-meta-label{font-size:9px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.05em}
.cal-meta-val{font-size:11px;font-weight:700;color:var(--white)}
.cal-year-label{font-size:10px;font-weight:700;color:var(--gray-400);padding:6px 14px 2px;background:var(--gray-50);border-bottom:1px solid var(--gray-100)}
.cal-months-grid{display:grid;grid-template-columns:1fr 1fr 1fr}
.cal-month{padding:8px 6px 6px;border-right:1px solid var(--gray-100);border-bottom:1px solid var(--gray-100)}
.cal-month:nth-child(3n){border-right:none}
.cal-month-name{font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;padding:0 2px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.cal-dow-h{font-size:8px;font-weight:600;color:var(--gray-400);text-align:center;padding:1px 0;text-transform:uppercase}
.cal-day{font-size:9px;text-align:center;padding:2px 1px;border-radius:4px;cursor:default;position:relative;line-height:1.4;color:var(--gray-600)}
.cal-day.empty{color:transparent}
.cal-day.today{background:var(--blue);color:var(--white);font-weight:700;border-radius:50%}
.cal-day.ev-torneo{background:#FEF3B0;color:#7A5F00;font-weight:700;border-radius:4px}
.cal-day.ev-amistoso{background:#DAEEFF;color:#00529F;font-weight:700;border-radius:4px}
.cal-day.ev-champions{background:#EFE0FA;color:#6B21A8;font-weight:700;border-radius:4px}
.cal-day.ev-seleccion_esp{background:#FFE0E0;color:#B91C1C;font-weight:700;border-radius:4px}
.cal-day.ev-seleccion_ext{background:#D1FAF0;color:#0F7560;font-weight:700;border-radius:4px}
.cal-day.ev-multi{background:linear-gradient(135deg,#FEF3B0 50%,#DAEEFF 50%);color:#1A1A22;font-weight:700;border-radius:4px}
.cal-day.weekend{color:var(--gray-400)}
.cal-day.ev-torneo.weekend,.cal-day.ev-amistoso.weekend,.cal-day.ev-champions.weekend,.cal-day.ev-seleccion_esp.weekend,.cal-day.ev-seleccion_ext.weekend{color:inherit}
.cal-legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px;border-top:1px solid var(--gray-100);background:var(--gray-50)}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--gray-600)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ===== RIGHT PANELS ===== */
.right-panels{display:flex;flex-direction:column;gap:14px}
.panel{background:var(--white);border-radius:var(--r2);border:1px solid var(--gray-100);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.panel-header{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.panel-header-left{display:flex;align-items:center;gap:8px}
.panel-color-bar{width:4px;height:16px;border-radius:2px;flex-shrink:0}
.panel-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.panel-count{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.panel-chevron{font-size:11px;color:var(--gray-400);transition:transform 0.2s}
.panel-chevron.open{transform:rotate(180deg)}
.panel-body{border-top:1px solid var(--gray-100)}
.panel-table{width:100%;border-collapse:collapse}
.panel-table th{font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.06em;padding:6px 10px;background:var(--gray-50);border-bottom:1px solid var(--gray-100);white-space:nowrap}
.panel-table td{padding:6px 10px;border-bottom:1px solid var(--gray-100);font-size:12px;color:var(--gray-900);vertical-align:middle}
.panel-table tr:last-child td{border-bottom:none}
.panel-table tr:hover td{background:var(--gray-50)}
.panel-table tr.empty-row td{color:var(--gray-400);font-style:italic;font-size:11px}
.td-date{font-size:11px;color:var(--gray-600);white-space:nowrap;min-width:64px}
.td-rival{font-weight:500}
.td-status{white-space:nowrap}
.td-actions{white-space:nowrap}
.status-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap}
.s-pendiente{background:var(--amber-light);color:var(--amber)}
.s-por-confirmar{background:#EEF2FF;color:#4338CA}
.s-confirmado{background:var(--green-light);color:var(--green)}
.s-cerrado{background:var(--gray-100);color:var(--gray-600)}
.s-cancelado{background:var(--red-light);color:var(--red)}
.btn-icon{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:4px;color:var(--gray-400);font-size:12px;transition:all 0.12s}
.btn-icon:hover{background:var(--blue-light);color:var(--blue)}
.btn-add-row{display:flex;align-items:center;gap:6px;padding:7px 14px;font-size:11px;color:var(--blue);font-weight:600;cursor:pointer;background:none;border:none;border-top:1px solid var(--gray-100);width:100%;font-family:inherit;transition:background 0.12s}
.btn-add-row:hover{background:var(--blue-light)}

/* ===== TORNEOS color bars ===== */
.ph-torneos .panel-color-bar{background:#F5C700}
.ph-torneos .panel-title{color:#8B6F00}
.ph-torneos .panel-count{background:#FEF9E0;color:#8B6F00}
.ph-amistosos .panel-color-bar{background:var(--blue)}
.ph-amistosos .panel-title{color:var(--blue-dark)}
.ph-amistosos .panel-count{background:var(--blue-light);color:var(--blue)}
.ph-champions .panel-color-bar{background:var(--purple)}
.ph-champions .panel-title{color:var(--purple)}
.ph-champions .panel-count{background:var(--purple-light);color:var(--purple)}
.ph-seleccion .panel-color-bar{background:var(--red)}
.ph-seleccion .panel-title{color:var(--red)}
.ph-seleccion .panel-count{background:var(--red-light);color:var(--red)}
.ph-seleccion2 .panel-color-bar{background:var(--teal)}
.ph-seleccion2 .panel-title{color:var(--teal)}
.ph-seleccion2 .panel-count{background:var(--teal-light);color:var(--teal)}

/* ===== MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--r3);width:100%;max-width:440px;overflow:hidden;box-shadow:var(--shadow-lg)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400);line-height:1;padding:0 4px}
.modal-body{padding:20px}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em}
.form-input,.form-select{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--white);color:var(--gray-900);transition:border-color 0.15s}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,82,159,0.1)}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--gray-100);display:flex;gap:8px;justify-content:flex-end}
.btn{padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s}
.btn-primary{background:var(--blue);color:var(--white)}
.btn-primary:hover{background:var(--blue-dark)}
.btn-primary:disabled{opacity:0.5;cursor:default}
.btn-secondary{background:var(--gray-100);color:var(--gray-700)}
.btn-secondary:hover{background:var(--gray-200)}
.btn-danger{background:var(--red-light);color:var(--red);margin-right:auto}
.btn-danger:hover{background:#FDDCDA}

/* ===== MOBILE ===== */
.mobile-nav{display:none;background:var(--blue-deep);padding:10px 16px;align-items:center;gap:10px;flex-shrink:0}
.mobile-team-select{flex:1;padding:8px 12px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:var(--r);color:var(--white);font-size:13px;font-weight:600;font-family:inherit;appearance:none;-webkit-appearance:none}
.mobile-menu-btn{background:none;border:none;color:var(--white);font-size:20px;cursor:pointer;padding:6px}
@media(max-width:900px){
  .sidebar{display:none}
  .mobile-nav{display:flex}
  .page{grid-template-columns:1fr;gap:16px;padding:16px}
  .topbar{padding:0 16px}
  .app{flex-direction:column}
  .main{height:calc(100vh - 52px - 44px)}
}
@media(max-width:600px){
  .topbar-fullname{display:none}
  .topbar-badge{display:none}
  .panel-table th:nth-child(3),.panel-table td:nth-child(3){display:none}
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR desktop -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-shield">RM</div>
        <div class="sidebar-name">Fútbol Base</div>
      </div>
      <div class="sidebar-season">Temporada 25 · 26</div>
    </div>
    <div class="sidebar-section">Equipos</div>
    <div id="sidebar-teams"></div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- Mobile top nav -->
    <div class="mobile-nav">
      <select class="mobile-team-select" id="mobile-team-select"></select>
    </div>

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-team" id="tb-team">—</div>
        <div class="topbar-fullname" id="tb-fullname"></div>
      </div>
      <div class="topbar-right">
        <div class="topbar-badge tb-preseason" id="tb-preseason" style="display:none"></div>

        <div class="status-pill"><div class="status-dot" id="status-dot"></div><span id="status-text">Conectando…</span></div>
      </div>
    </div>

    <!-- Page content -->
    <div class="page" id="page">
      <div class="cal-panel" id="cal-panel">
        <div class="cal-panel-header">
          <span class="cal-panel-title">Calendario Temporada</span>
          <div class="cal-meta">
            <div class="cal-meta-item"><div class="cal-meta-label">Eventos</div><div class="cal-meta-val" id="cal-total">0</div></div>
            <div class="cal-meta-item"><div class="cal-meta-label">Torneos</div><div class="cal-meta-val" id="cal-torneos">0</div></div>
            <div class="cal-meta-item"><div class="cal-meta-label">Amistosos</div><div class="cal-meta-val" id="cal-amistosos">0</div></div>
          </div>
        </div>
        <div id="cal-body"></div>
        <div class="cal-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#FEF3B0;border:1px solid #D4AA00"></div>Torneo</div>
          <div class="legend-item"><div class="legend-dot" style="background:#DAEEFF;border:1px solid #00529F"></div>Amistoso</div>
          <div class="legend-item"><div class="legend-dot" style="background:#EFE0FA;border:1px solid #8E44AD"></div>Champions</div>
          <div class="legend-item"><div class="legend-dot" style="background:#FFE0E0;border:1px solid #E74C3C"></div>Sel. Española</div>
          <div class="legend-item"><div class="legend-dot" style="background:#D1FAF0;border:1px solid #16A085"></div>Sel. Extranjera</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--blue);border-radius:50%"></div>Hoy</div>
        </div>
      </div>

      <div class="right-panels" id="right-panels">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>
</div>

<!-- Modal evento -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nuevo evento</div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Tipo de panel</label>
        <select class="form-select" id="f-panel">
          <option value="torneo">Torneo</option>
          <option value="amistoso">Amistoso</option>
          <option value="champions">Partido Champions 1er Equipo</option>
          <option value="seleccion_esp">Convocatoria Selección Española</option>
          <option value="seleccion_ext">Convocatoria Selección Extranjera</option>
        </select>
      </div>
      <div class="form-row-2">
        <div>
          <label class="form-label">Fecha inicio</label>
          <input class="form-input" type="date" id="f-date"/>
        </div>
        <div>
          <label class="form-label">Fecha fin</label>
          <input class="form-input" type="date" id="f-date-end"/>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Rival / Nombre evento</label>
        <input class="form-input" id="f-rival" placeholder="Nombre del rival o torneo…"/>
      </div>
      <div class="form-row-2">
        <div>
          <label class="form-label">Sede / lugar</label>
          <input class="form-input" id="f-location" placeholder="Ciudad, campo…"/>
        </div>
        <div>
          <label class="form-label">Estado</label>
          <select class="form-select" id="f-status">
            <option value="pendiente">Pendiente</option>
            <option value="por confirmar">Por confirmar</option>
            <option value="confirmado">Confirmado</option>
            <option value="cerrado">Cerrado</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Notas</label>
        <input class="form-input" id="f-notes" placeholder="Observaciones…"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btn-delete" style="display:none">Eliminar</button>
      <button class="btn btn-secondary" id="btn-cancel">Cancelar</button>
      <button class="btn btn-primary" id="btn-save">Guardar</button>
    </div>
  </div>
</div>

  {key:'torneo',     label:'Torneos',                        cls:'ph-torneos',   cols:['Rival / Nombre','Fecha inicio','Fecha fin','Sede','Estado']},
  {key:'amistoso',   label:'Amistosos',                      cls:'ph-amistosos', cols:['Rival','Fecha','Sede','Estado']},
  {key:'champions',  label:'Partidos Champions 1er Equipo',  cls:'ph-champions', cols:['Rival','Fecha','Estado','Notas']},
  {key:'seleccion_esp', label:'Convocatorias Selección Española',  cls:'ph-seleccion',  cols:['Jugador / Selección','Fecha','Estado']},
  {key:'seleccion_ext', label:'Convocatorias Selección Extranjera',cls:'ph-seleccion2', cols:['Jugador / Selección','Fecha','Estado']},
];

let events = [];
let currentTeam = TEAMS[0].code;
let editingId = null;
let currentPanelKey = 'torneo';

// Firebase listener
const q = query(collection(db,'seasons',SEASON,'events'), orderBy('date'));
onSnapshot(q, snap => {
  events = snap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById('status-dot').className='status-dot';
  document.getElementById('status-text').textContent='En línea';
  renderAll();
  updateSidebarDots();
}, () => {
  document.getElementById('status-dot').className='status-dot off';
  document.getElementById('status-text').textContent='Sin conexión';
});

function teamEvents(code){ return events.filter(e=>e.team===code); }
function teamByCode(c){ return TEAMS.find(t=>t.code===c)||{code:c,name:c}; }
function fmtDate(d){ if(!d) return '—'; const [y,m,day]=d.split('-'); return `${parseInt(day)} ${MES[parseInt(m)-1]}`; }
function fmtDateFull(d){ if(!d) return '—'; const [y,m,day]=d.split('-'); return `${parseInt(day)} ${MES_FULL[parseInt(m)-1]} ${y}`; }
function today(){ return new Date().toISOString().slice(0,10); }

function selectTeam(code){
  currentTeam = code;
  document.querySelectorAll('.team-btn').forEach(b=>b.classList.toggle('active', b.dataset.code===code));
  const msel = document.getElementById('mobile-team-select');
  if(msel) msel.value = code;
  renderAll();
}

function renderAll(){
  const t = teamByCode(currentTeam);
  document.getElementById('tb-team').textContent = t.code;
  document.getElementById('tb-fullname').textContent = t.name;

  const evs = teamEvents(currentTeam);
  document.getElementById('cal-total').textContent = evs.length;
  document.getElementById('cal-torneos').textContent = evs.filter(e=>e.panel==='torneo').length;
  document.getElementById('cal-amistosos').textContent = evs.filter(e=>e.panel==='amistoso').length;

  renderCalendar(evs, t);
  renderPanels(evs);
}

// Priority order for color when multiple events on same day
const PANEL_PRIORITY = ['torneo','amistoso','champions','seleccion_esp','seleccion_ext'];

function renderCalendar(evs, team){
  // Build map: date -> { types: Set, labels: [] }
  const eventDates = {};
  evs.forEach(e => {
    if(!e.date) return;
    const start = e.date;
    const end = e.dateEnd||e.date;
    let cur = new Date(start+'T12:00:00');
    const endD = new Date(end+'T12:00:00');
    while(cur<=endD){
      const ds = cur.toISOString().slice(0,10);
      if(!eventDates[ds]) eventDates[ds]={types:new Set(),labels:[]};
      const panel = e.panel||'amistoso';
      eventDates[ds].types.add(panel);
      if(e.rival) eventDates[ds].labels.push(e.rival);
      cur = new Date(cur.getTime()+86400000);
    }
  });

  const todayStr = today();
  let html = '';
  let lastYear = null;

  SEASON_MONTHS.forEach(({y,m}) => {
    if(y !== lastYear){
      html += `<div class="cal-year-label">${y}</div><div class="cal-months-grid">`;
      lastYear = y;
    }

    const daysInMonth = new Date(y,m+1,0).getDate();
    let startOffset = new Date(y,m,1).getDay()-1;
    if(startOffset<0) startOffset=6;

    html += `<div class="cal-month"><div class="cal-month-name">${MES[m]}</div><div class="cal-dow">`;
    DOW.forEach(d=>{ html+=`<div class="cal-dow-h">${d}</div>`; });

    for(let i=0;i<startOffset;i++) html+=`<div class="cal-day empty">·</div>`;

    for(let d=1;d<=daysInMonth;d++){
      const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow = (new Date(ds+'T12:00:00').getDay()+6)%7; // 0=Mon
      let cls = 'cal-day';
      let tooltip = ds;

      if(ds===todayStr){
        cls += ' today';
      } else if(eventDates[ds]){
        const types = eventDates[ds].types;
        const labels = eventDates[ds].labels;
        // Pick highest priority type for the color class
        const dominant = PANEL_PRIORITY.find(p=>types.has(p)) || 'amistoso';
        if(types.size > 1){
          cls += ' ev-multi';
        } else {
          cls += ` ev-${dominant}`;
        }
        tooltip = labels.length>0 ? labels.join(', ') : dominant;
      }

      if(dow>=5) cls += ' weekend';
      html+=`<div class="${cls}" title="${tooltip}">${d}</div>`;
    }

    html += `</div></div>`;

    // Close the months grid every 3 months
    if((m===8&&y===2025)||(m===11&&y===2025)||(m===2&&y===2026)||(m===5&&y===2026)){
      html += `</div>`;
      lastYear = null;
    }
  });

  document.getElementById('cal-body').innerHTML = html;
}

function renderPanels(evs){
  const container = document.getElementById('right-panels');
  let html = '';

  PANELS.forEach(panel => {
    const panelEvs = evs.filter(e=>(e.panel||'amistoso')===panel.key).sort((a,b)=>(a.date||'').localeCompare(b.date||''));

    html += `<div class="panel">
      <div class="panel-header" onclick="togglePanel('${panel.key}')">
        <div class="panel-header-left">
          <div class="panel-color-bar ${panel.cls}"></div>
          <span class="panel-title ${panel.cls}">${panel.label}</span>
          <span class="panel-count ${panel.cls}">${panelEvs.length}</span>
        </div>
        <span class="panel-chevron open" id="chev-${panel.key}">▾</span>
      </div>
      <div class="panel-body" id="pb-${panel.key}">
        <table class="panel-table">
          <thead><tr>`;

    panel.cols.forEach(c=>{ html+=`<th>${c}</th>`; });
    html+=`<th></th></tr></thead><tbody>`;

    if(panelEvs.length===0){
      html+=`<tr class="empty-row"><td colspan="${panel.cols.length+1}">Sin eventos — haz clic en + para añadir</td></tr>`;
    } else {
      panelEvs.forEach(e=>{
        html+=`<tr>`;
        if(panel.key==='torneo'){
          html+=`<td class="td-rival">${e.rival||'—'}</td>
                 <td class="td-date">${fmtDate(e.date)}</td>
                 <td class="td-date">${fmtDate(e.dateEnd)}</td>
                 <td>${e.location||'—'}</td>`;
        } else if(panel.key==='amistoso'){
          html+=`<td class="td-rival">${e.rival||'—'}</td>
                 <td class="td-date">${fmtDate(e.date)}</td>
                 <td>${e.location||'—'}</td>`;
        } else if(panel.key==='champions'){
          html+=`<td class="td-rival">${e.rival||'—'}</td>
                 <td class="td-date">${fmtDate(e.date)}</td>
                 <td></td>
                 <td>${e.notes||'—'}</td>`;
        } else {
          html+=`<td class="td-rival">${e.rival||'—'}</td>
                 <td class="td-date">${fmtDate(e.date)}</td>
                 <td></td>`;
        }
        const st = e.status||'pendiente';
        html+=`<td class="td-status"><span class="status-badge s-${st.replace(' ','-')}">${st}</span></td>`;
        html+=`<td class="td-actions">
          <button class="btn-icon" onclick="openEdit('${e.id}')" title="Editar">✏️</button>
        </td></tr>`;
      });
    }

    html+=`</tbody></table>
      <button class="btn-add-row" onclick="openNew('${panel.key}')">＋ Añadir ${panel.label.toLowerCase()}</button>
    </div></div>`;
  });

  container.innerHTML = html;
}

function updateSidebarDots(){
  TEAMS.forEach(t=>{
    const btn = document.querySelector(`.team-btn[data-code="${t.code}"]`);
    if(!btn) return;
    if(teamEvents(t.code).length>0) btn.classList.add('has-events');
    else btn.classList.remove('has-events');
  });
}

window.togglePanel = function(key){
  const pb = document.getElementById('pb-'+key);
  const chev = document.getElementById('chev-'+key);
  if(!pb) return;
  const open = pb.style.display!=='none';
  pb.style.display = open?'none':'block';
  chev.classList.toggle('open',!open);
};

window.openNew = function(panelKey){
  editingId = null;
  currentPanelKey = panelKey;
  document.getElementById('modal-title').textContent = 'Nuevo evento';
  document.getElementById('btn-delete').style.display='none';
  document.getElementById('f-panel').value = panelKey;
  document.getElementById('f-date').value='';
  document.getElementById('f-date-end').value='';
  document.getElementById('f-rival').value='';
  document.getElementById('f-location').value='';
  document.getElementById('f-status').value='pendiente';
  document.getElementById('f-notes').value='';
  document.getElementById('modal').classList.add('open');
};

window.openEdit = function(id){
  const ev = events.find(e=>e.id===id);
  if(!ev) return;
  editingId = id;
  document.getElementById('modal-title').textContent='Editar evento';
  document.getElementById('btn-delete').style.display='block';
  document.getElementById('f-panel').value=ev.panel||'amistoso';
  document.getElementById('f-date').value=ev.date||'';
  document.getElementById('f-date-end').value=ev.dateEnd||'';
  document.getElementById('f-rival').value=ev.rival||'';
  document.getElementById('f-location').value=ev.location||'';
  document.getElementById('f-status').value=ev.status||'pendiente';
  document.getElementById('f-notes').value=ev.notes||'';
  document.getElementById('modal').classList.add('open');
};

// Auto-fill end date
document.getElementById('f-date').addEventListener('change',function(){
  if(!document.getElementById('f-date-end').value) document.getElementById('f-date-end').value=this.value;
});

document.getElementById('btn-save').addEventListener('click', async ()=>{
  const date = document.getElementById('f-date').value;
  const rival = document.getElementById('f-rival').value.trim();
  if(!date&&!rival){ alert('Introduce al menos una fecha o rival'); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='Guardando…';
  const data = {
    team: currentTeam,
    panel: document.getElementById('f-panel').value,
    date, rival,
    dateEnd: document.getElementById('f-date-end').value||date,
    location: document.getElementById('f-location').value.trim()||null,
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value.trim()||null,
    updatedAt: serverTimestamp(),
    season: SEASON,
  };
  try{
    if(editingId) await updateDoc(doc(db,'seasons',SEASON,'events',editingId),data);
    else{ data.createdAt=serverTimestamp(); await addDoc(collection(db,'seasons',SEASON,'events'),data); }
    document.getElementById('modal').classList.remove('open');
  } catch(e){ alert('Error: '+e.message); }
  btn.disabled=false; btn.textContent='Guardar';
});

document.getElementById('btn-delete').addEventListener('click', async ()=>{
  if(!editingId||!confirm('¿Eliminar este evento?')) return;
  await deleteDoc(doc(db,'seasons',SEASON,'events',editingId));
  document.getElementById('modal').classList.remove('open');
});

document.getElementById('btn-cancel').addEventListener('click',()=>document.getElementById('modal').classList.remove('open'));
document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('open'); });

// Build sidebar + mobile select
const sidebarTeams = document.getElementById('sidebar-teams');
const mobileSelect = document.getElementById('mobile-team-select');
TEAMS.forEach(t=>{
  const btn = document.createElement('button');
  btn.className='team-btn'+(t.code===currentTeam?' active':'');
  btn.dataset.code=t.code;
  btn.innerHTML=`<span class="team-btn-code">${t.code}</span><span class="team-btn-name">${t.name}</span><span class="sidebar-dot"></span>`;
  btn.addEventListener('click',()=>selectTeam(t.code));
  sidebarTeams.appendChild(btn);

  const opt = document.createElement('option');
  opt.value=t.code; opt.textContent=`${t.code} — ${t.name}`;
  mobileSelect.appendChild(opt);
});
mobileSelect.addEventListener('change',e=>selectTeam(e.target.value));

// Initial render with empty data
renderAll();
</script>
</body>
</html>
